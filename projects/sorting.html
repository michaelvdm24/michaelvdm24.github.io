<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <meta name="description" content="Sorting visualization tool">
    <meta name="author" content="Michael van der Merwe">
    <link rel="stylesheet" href="../static/css/sorting/sorting.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Kanit:wght@300" type="text/css">
    <link rel="shortcut icon" href="../static/favicon.ico">
    <title>Sorting Visualizer</title>
</head>

<body>

<div class="dropdown">
    <p class="dropbox" id="main button"></p>
    <div class="dropdown-content">
        <button name="submit_button" id="bubble">Bubble Sort</button>
        <button name="submit_button" id="selection">Selection Sort</button>
        <button name="submit_button" id="insertion">Insertion Sort</button>
        <button name="submit_button" id="quick">Quick Sort</button>
        <button name="submit_button" id="merge">Merge Sort</button>
        <button name="submit_button" id="heap">Heap Sort</button>
    </div>
</div>

<p class="instruct">Change Array Size</p>

<div class="slidecontainer">
    <input type="range" min="10" max="200" value="10" class="slider" id="myRange">
</div>

<p class="arraysize">Array Size: <span id="rangeReader"></span></p>

<button class="generate" id="regenerate">Generate New Array</button>

<button class="performSort" id="performSort">Sort!</button>

<div class="chartContainer" id="chartContainer"></div>

<table class="sortTable">
    <tr>
        <th>Best Case:</th>
        <th>Average Case:</th>
        <th>Worst Case:</th>
        <th>Memory:</th>
        <th>Stable:</th>
    </tr>
    <tr>
        <td id="bestcase"><sup id="sup1"></sup></td>
        <td id="averagecase"><sup id="sup2"></sup></td>
        <td id="worstcase"><sup id="sup3"></sup></td>
        <td id="memory"></td>
        <td id="stable"></td>
    </tr>
</table>

<script src="../static/scripts/sorting/sorting.js"></script>
<script src="../static/scripts/sorting/dynamic.js"></script>

</body>
</html>
